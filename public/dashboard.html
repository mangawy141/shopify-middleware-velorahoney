<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/velora_3.png" />
    <link rel="stylesheet" href="/dashboard.css" />
    <title>📦 Shipping Dashboard</title>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header>
        <div>
          <h1>📦 Shipping Management Dashboard</h1>
          <p class="subtitle">
            Manual order shipping control • Real-time updates
          </p>
        </div>
        <div class="header-right">
          <span id="adminName"></span>
          <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
      </header>

      <!-- Search & Filter Bar -->
      <div class="search-filter-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="🔍 ابحث برقم الطلب أو الاسم..."
          onkeyup="handleSearch()"
        />
        <select id="filterStatus" onchange="handleFilter()">
          <option value="all">جميع الطلبات</option>
          <option value="pending">معلقة</option>
          <option value="with-discount">فيها خصم</option>
          <option value="high-value">قيمة عالية</option>
        </select>
        <button class="reset-btn" onclick="resetSearchFilter()">
          🔄 إعادة تعيين
        </button>
      </div>

      <!-- Statistics -->
      <div id="stats" class="stats">
        <div class="loading">جاري التحميل...</div>
      </div>

      <!-- Messages -->
      <div id="message"></div>

      <!-- Orders List -->
      <div id="orders" class="orders">
        <div class="loading">جاري تحميل الطلبات...</div>
      </div>

      <!-- Refresh Info -->
      <div class="refresh-info">🔄 يتم التحديث تلقائياً كل 5 ثواني</div>
    </div>

    <!-- Scripts -->
    <script src="/dashboard.js"></script>
  </body>
</html>
